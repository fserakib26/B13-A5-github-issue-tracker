<body class="bg-[#F8FAFC]">
   
    <header class="navbar bg-base-100 shadow-sm flex justify-between px-20 mx-auto">
        <div class="flex items-center">
            <img src="./assets/github-logo.png" alt="" class="w-10">
            <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
        </div>
        <div class="flex gap-2">
            <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g
                    stroke-linejoin="round"
                    stroke-linecap="round"
                    stroke-width="2.5"
                    fill="none"
                    stroke="currentColor"
                    >
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input type="search" required placeholder="Search issues..." id="search-field" onkeyup="search()" />
            </label>
            <button class="btn btn-primary">+New Issues</button>
        </div>
    </header>

    <main class="w-9/12 mx-auto">
        <div class="mx-auto mt-10 bg-slate-100 p-5 rounded-md shadow-md">
            <button onclick="showAll()" class="btn btn-outline btn-primary" id="all-btn">All</button>
            <button onclick="openIssues()" class="btn btn-outline btn-primary" id="open-btn">Open</button>
            <button onclick="closedIssues()" class="btn btn-outline btn-primary" id="closed-btn">Closed</button>
        </div>

        <div class="mt-4 p-5 bg-slate-100 rounded-md shadow-md flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div>
                    <img src="./assets/Aperture.png" alt="">
                </div>
                <div>
                    <h2 id="issue-count" class="font-bold"></h2>
                    <p class="text-gray-500">Track and manage your project issues</p>
                </div>
            </div>
            <div class="space-x-4">

                <span><i class="fa-solid fa-circle text-green-600"></i>  Open</span>
                <span><i class="fa-solid fa-circle text-purple-600"></i>  Closed</span>
            </div>
        </div>

        <div id="all-issues-container" class="grid grid-cols-4 gap-4">
            <!-- Issue Cards Show Here Daynamically from JavaScrpit file from API -->
        </div>

        <div id="open-issues-container">

        </div>

        <div id="spinner" class="flex justify-center items-center hidden">
            <span class="loading loading-spinner text-primary"></span>
        </div>

        <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
        <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <div id="modals-container">
                
            </div>
            <div class="modal-action">
            <form method="dialog">
                <!-- if there is a button in form, it will close the modal -->
                <button class="btn btn-primary">Close</button>
            </form>
            </div>
        </div>
        </dialog>
