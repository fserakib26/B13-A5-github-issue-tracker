<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- External CSS -->
     <link rel="stylesheet" href="style.css">

    <!-- DaisyUI & Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Geist Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body class="bg-[#F8FAFC]">
   
    <header class="navbar bg-base-100 shadow-sm flex justify-between px-20 mx-auto">
        <div class="flex items-center">
            <img src="./assets/github-logo.png" alt="" class="w-10">
            <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
        </div>
        <div class="flex gap-2">
            <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g
                    stroke-linejoin="round"
                    stroke-linecap="round"
                    stroke-width="2.5"
                    fill="none"
                    stroke="currentColor"
                    >
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input type="search" required placeholder="Search issues..." />
            </label>
            <button class="btn btn-primary">+New Issues</button>
        </div>
    </header>

    <main class="w-9/12 mx-auto">
        <div class="mx-auto mt-10 bg-slate-100 p-5 rounded-md shadow-md">
            <button class="btn btn-primary">All</button>
            <button class="btn">Open</button>
            <button class="btn">Closed</button>
        </div>

        <div class="mt-4 p-5 bg-slate-100 rounded-md shadow-md flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div>
                    <img src="./assets/Aperture.png" alt="">
                </div>
                <div>
                    <h2 class="font-bold">50 Issues</h2>
                    <p class="text-gray-500">Track and manage your project issues</p>
                </div>
            </div>
            <div class="space-x-4">

                <span><i class="fa-solid fa-circle text-green-600"></i>  Open</span>
                <span><i class="fa-solid fa-circle text-purple-600"></i>  Closed</span>
            </div>
        </div>

        <div class="w-3/12">
            <div>
                <div class="flex items-center justify-between">
                    <div>
                        <span class="status"><div class="badge badge-success"></div></span>
                    </div>

                    <div>
                        <span class="Priority"><div class="badge badge-error">High</div></span>
                    </div>
                </div>
                <div>

                </div>
                <div></div>
            </div>

            <div>

            </div>
        </div>
    </main>
    

</body>
</html>
